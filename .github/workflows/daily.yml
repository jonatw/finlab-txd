name: daily
# 兩個時點,各有角色:
#  ① 盤前 21:00 UTC = 05:00 台北(早於永豐 06:00 接單窗;越早掛開盤排序越前):用「隔夜剛更新的 MOVE」
#     算當日開盤的【權威訊號】,讓使用者 6 點一開窗就能掛單。回測 pos[D]=exposure[D-1]=f(TAIEX[D-1], MOVE[D-1]),
#     MOVE[D-1](美債)美股收盤後 ~04:30 TWT 到 → 05:00 這班拿得到對齊回測的 MOVE;05:30 retry 補 aggregate 慢的情形。
#     ⚠️ UTC 日要 -1:05:00 TWT 週一 = 21:00 UTC 週日 → day-of-week 用 0-4。
#  ② 收盤後 06:30 UTC = 14:30 台北:推進當日 TAIEX 收盤 + 重試窗(15:30/16:30/17:30),把資料補到最新交易日。
# MOVE 為美債、正常晚台股 1 個交易日(freshness 已處理);Yahoo 暫時失敗時重試窗冪等補上(無實質變化不刷 commit)。
# 早班(05:00/05:30)若 MOVE 尚未 aggregate → 容忍不 hard-fail(後續班補上);只有 17:30 末班/手動仍 stale 才標紅。
on:
  schedule:
    - cron: "0 21 * * 0-4"    # 05:00 TWT 盤前 — 隔夜 MOVE 產生當日開盤【權威訊號】(6 點下單前;UTC 日 -1)
    - cron: "30 21 * * 0-4"   # 05:30 TWT — 盤前 retry(05:00 若 MOVE 尚未 aggregate 則補)
    - cron: "30 6 * * 1-5"    # 14:30 TWT — 收盤後推進 TAIEX + preliminary 次日訊號(MOVE 尚未更新)
    - cron: "30 7 * * 1-5"    # 15:30 TWT — 重試窗
    - cron: "30 8 * * 1-5"    # 16:30 TWT — 重試窗
    - cron: "30 9 * * 1-5"    # 17:30 TWT — 末班;仍 stale 則告警 + job 標紅
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: daily
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: pipeline (fetch Yahoo → rebuild → metrics → export)
        run: python -m src.pipeline
      - name: gate (must pass before deploy)
        run: python -m pytest -q
      - name: commit & push (Cloudflare Pages auto-deploys on push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily $(date -u +%Y-%m-%d)"
          git push
      - name: notify on signal change (push)
        # 只在設了 repo 變數 NOTIFY_WEBHOOK_URL 時啟用;script 內再判 signal.changed 才真送。
        if: ${{ vars.NOTIFY_WEBHOOK_URL != '' }}
        env:
          WEBHOOK: ${{ vars.NOTIFY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: python scripts/notify_webhook.py
      - name: stale guard (末班/手動仍 stale → 告警 + job 標紅)
        # 重試窗末班(17:30 TWT)或手動觸發時,若訊號仍過期 → 發 stale webhook + 讓 job 失敗(GitHub 通知 + Actions 紅燈)。
        # 早班(05:00/05:30)的暫時 stale 不在此 gate(MOVE 可能尚未 aggregate),避免重試過程誤報。
        if: ${{ github.event.schedule == '30 9 * * 1-5' || github.event_name == 'workflow_dispatch' }}
        env:
          WEBHOOK: ${{ vars.NOTIFY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          python scripts/notify_webhook.py --stale || true
          python - <<'PY'
          import json, sys
          fr = json.load(open("site/data/signal.json"))["freshness"]
          fail = False
          if fr.get("data_stale"):
              print(f"::error::TXD TAIEX 過期 — 最後 {fr['px_index']} 但應到 {fr['expected_last_session']}"
                    f"(落後 {fr['data_lag_sessions']} 個台股交易日)。Yahoo 抓取可能持續失敗。")
              fail = True
          if fr.get("move_stale"):
              print(f"::error::TXD ^MOVE 過期 — 最後 {fr['move']} 但應到 {fr['expected_us_session']}"
                    f"(落後 {fr['move_us_lag_sessions']} 個美股交易日)。Yahoo 靜默回傳過期 bar — repair 仍補不到 = 真故障。")
              fail = True
          # 多源交叉驗證(TWSE 官方):TAIEX 已自動修正(僅告知);ETF 對照線不符 → 告警人工 review(非策略輸入,不擋部署)
          xc = fr.get("xcheck", {})
          for c in xc.get("taiex_corrections", []):
              print(f"::warning::TXD TAIEX {c['date']} 已自動以 TWSE 官方修正 {c['old_close']}→{c['new_close']}"
                    f"(Yahoo {c['yahoo_ret_pct']}% vs TWSE {c['twse_ret_pct']}%)— 策略輸入已用權威源校正")
          for c in xc.get("etf_corrections", []):
              print(f"::warning::TXD ETF {c['etf']} 含息已自動以 TWSE(raw+股利)重建 自 {c['from']}"
                    f"({c['n_bars']} bars,末值 {c['old_last_close']}→{c['new_last_close']})")
          for f in xc.get("etf_flags", []):
              print(f"::warning::TXD ETF {f['etf']} {f['date']} 與 TWSE 不符且股利抓取失敗 "
                    f"(stored {f['stored_ret_pct']}% vs TWSE raw {f.get('twse_raw_ret_pct')}%)— 人工 review")
          if fail:
              sys.exit(1)
          print(f"signal fresh; stale guard OK. xcheck validated={xc.get('validated')} "
                f"taiex_fixed={len(xc.get('taiex_corrections', []))} etf_fixed={len(xc.get('etf_corrections', []))} "
                f"etf_flags={len(xc.get('etf_flags', []))}.")
          PY
